<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AuremAI">
  <defs>
    <linearGradient id="favGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0c254"/>
      <stop offset="1" stop-color="#e3a82b"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a3729"/>
  <!-- monogram A: right leg -->
  <path d="M32 15 45 49" fill="none" stroke="url(#favGold)" stroke-width="6"
        stroke-linecap="round"/>
  <!-- crossbar -->
  <path d="M24.5 34 H39.5" fill="none" stroke="url(#favGold)" stroke-width="5.5"
        stroke-linecap="round"/>
  <!-- left leg doubles as a rising chart line -->
  <path d="M19 49 26 34 32 15" fill="none" stroke="url(#favGold)" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- circuit node / chart apex -->
  <circle cx="32" cy="15" r="4.2" fill="#f0c254"/>
</svg>
