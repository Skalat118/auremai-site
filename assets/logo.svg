<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AuremAI logo">
  <defs>
    <linearGradient id="auremGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0c254"/>
      <stop offset="1" stop-color="#e3a82b"/>
    </linearGradient>
  </defs>
  <!-- tech / token: rounded hexagon shell -->
  <path d="M32 4 56 18 56 46 32 60 8 46 8 18 Z"
        fill="none" stroke="url(#auremGold)" stroke-width="3"
        stroke-linejoin="round" stroke-opacity="0.5"/>
  <!-- monogram A: right leg -->
  <path d="M32 17 44 47" fill="none" stroke="url(#auremGold)" stroke-width="5"
        stroke-linecap="round"/>
  <!-- monogram A: crossbar -->
  <path d="M25.5 35 H38.5" fill="none" stroke="url(#auremGold)" stroke-width="4.5"
        stroke-linecap="round"/>
  <!-- left leg doubles as a rising chart line -->
  <path d="M20 47 26 35 32 17" fill="none" stroke="url(#auremGold)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- circuit nodes / chart data points -->
  <circle cx="20" cy="47" r="3" fill="#c8881a"/>
  <circle cx="26" cy="35" r="3" fill="#f0c254"/>
  <circle cx="32" cy="17" r="3.8" fill="#e3a82b"/>
</svg>
